<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#09111d">
  <title>Dell Guardian Agent Control Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link href="/static/style.css" rel="stylesheet">
</head>
<body>
  <div id="root"><div style="padding:28px;color:var(--text);font-family:Inter,system-ui,sans-serif;">Loading Dell Guardian Agent…</div></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script>
    // Static bootstrap for SPA; dynamic values are fetched by the app from /api
    window.DELL_GUARDIAN_BOOTSTRAP = {
      dashboardTitle: "Dell Guardian Agent Control Center",
      displayName: "Dell M380",
      displayIp: "192.168.13.5"
    };
  </script>
  <script>
    // Runtime error overlay for debugging client-side failures
    window.addEventListener('error', function (e) {
      try {
        document.body.innerHTML = '<pre style="color:#c00;background:#fff;padding:1rem;white-space:pre-wrap;">Client Error: ' + (e.message || e.error || 'unknown') + '\n' + (e.filename || '') + ':' + (e.lineno || '') + '</pre>';
      } catch (ex) {
        // no-op
      }
    });
    window.addEventListener('unhandledrejection', function (e) {
      try {
        document.body.innerHTML = '<pre style="color:#c00;background:#fff;padding:1rem;white-space:pre-wrap;">Unhandled Rejection: ' + (e.reason && (e.reason.message || e.reason)) + '</pre>';
      } catch (ex) {}
    });
  </script>
  <script src="/static/app.js"></script>
</body>
</html>
