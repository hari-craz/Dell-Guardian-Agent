services:
  dellguardian-backend:
    build: .
    container_name: dellguardian-backend
    network_mode: host
    pid: host
    privileged: true
    restart: always
    env_file:
      - .env
    environment:
      - PORT=${PORT:-5051}
      - DELL_GUARDIAN_PASSWORD=${DELL_GUARDIAN_PASSWORD:-hari1234}
      - DELL_GUARDIAN_HOSTNAME=${DELL_GUARDIAN_HOSTNAME:-Dell M380}
      - DELL_GUARDIAN_IP=${DELL_GUARDIAN_IP:-192.168.13.5}
      - DELL_GUARDIAN_CONTAINER_STATUS=${DELL_GUARDIAN_CONTAINER_STATUS:-Running}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /sbin:/sbin
      - /usr/sbin:/usr/sbin
      - /proc:/host_proc:ro

  dellguardian-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: dellguardian-frontend
    ports:
      - "10001:10001"
    restart: always
    depends_on:
      - dellguardian-backend
